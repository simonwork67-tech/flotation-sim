<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flotation Sim</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --card: #f9fafb;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    main {
      width: min(760px, 100%);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    p.lead {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
      max-width: 42rem;
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 18px;
      padding: 18px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      border-color: #d1d5db;
      outline: none;
    }

    .eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1.15rem;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Flotation Sim</h1>
    <p class="lead">
      Simple browser-based demos and visual foundations for flotation simulation work.
    </p>

    <section class="grid" aria-label="Available pages">
      <a class="card" href="single-particle-test/">
        <div class="eyebrow">Test Page</div>
        <h2>Single Particle</h2>
        <p>
          A minimal 3D particle viewer with a uniform mineral surface, triangular patch sphere geometry, drag rotation, and scroll zoom.
        </p>
      </a>
    </section>
  </main>
</body>
</html>
